<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LVL Consulting - Crear cuenta</title>
    <!-- LVL - style.css -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="font-sans antialiased">

    <div class="fixed inset-0 z-0">
        <img src="assets/img/fondologin.png" class="w-full h-full object-contain object-bottom bg-black opacity-20"
            alt="Fondo">
    </div>

    <div class="gradient-bg"></div>

    <canvas id="particles-canvas"></canvas>

    <div class="min-h-screen flex items-center justify-center p-5 form-container">
        <div class="form-card w-full max-w-md bg-white/10 backdrop-blur-md rounded-2xl shadow-2xl border border-white/20 p-8 transition-all duration-300">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-blue-500 tracking-tight">Crear cuenta</h1>
                <p class="text-indigo-100 mt-2 text-sm">Únete a la comunidad de LVL Consulting</p>
            </div>

            <!-- Formulario -->
            <form id="registerForm" class="space-y-5">
                <!-- Correo electrónico -->
                <div>
                    <label class="block text-white text-sm font-medium mb-1" for="email">Correo electrónico *</label>
                    <input type="email" id="email" name="email" required
                        class="input-hover-effect w-full px-4 py-3 rounded-lg bg-white/90 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
                        placeholder="Introducir la dirección del correo electrónico">
                </div>

                <!-- Usuario -->
                <div>
                    <label class="block text-white text-sm font-medium mb-1" for="username">Nombre del usuario *</label>
                    <input type="text" id="username" name="username" required
                        class="input-hover-effect w-full px-4 py-3 rounded-lg bg-white/90 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
                        placeholder="Introducir nombre del usuario">
                </div>

                <!-- Contraseña -->
                <div>
                    <label class="block text-white text-sm font-medium mb-1" for="password">Contraseña *</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required
                            class="input-hover-effect w-full px-4 py-3 rounded-lg bg-white/90 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition pr-12"
                            placeholder="Introducir la contraseña">
                        <button type="button" id="togglePassword"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-600 hover:text-blue-600 transition">
                            <i class="far fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <!-- Términos y condiciones -->
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="terms"
                        class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="terms" class="text-white/90 text-sm">Al registrarte aceptas los <a href="#"
                            class="text-blue-300 underline hover:text-white">Términos de uso de LVL
                            Consulting</a></label>
                </div>

                <!-- Selector de categoría -->
                <div>
                    <label class="block text-white text-sm font-medium mb-1" for="category">Agregar categoría
                        (opcional)</label>
                    <select id="category" name="category"
                        class="input-hover-effect w-full px-4 py-3 rounded-lg bg-white/90 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition cursor-pointer">
                        <option value="">Selecciona una categoría</option>
                        <option value="developer">Developer</option>
                        <option value="designer">Designer</option>
                        <option value="consultant">Consultant</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>

                <!-- Botón Crear cuenta -->
                <button type="submit"
                    class="btn-primary w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-semibold py-3 rounded-lg shadow-md hover:from-blue-700 hover:to-indigo-800 transition-all duration-200 flex items-center justify-center gap-2">
                    <i class="fas fa-user-plus"></i> Crear cuenta
                </button>
            </form>

            <div class="relative my-6">
                <div class="grid grid-cols-3 items-center gap-2">
                    <div class="h-px bg-white/30"></div>
                    <div class="text-center text-sm text-white/80">Crear cuenta con</div>
                    <div class="h-px bg-white/30"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button id="googleBtn"
                    class="social-btn btn-google flex items-center justify-center gap-2 bg-white/20 border border-white/30 text-white font-medium py-2 rounded-lg hover:bg-white/30 transition">
                    <i class="fab fa-google"></i> Google
                </button>
                <button id="facebookBtn"
                    class="social-btn btn-facebook flex items-center justify-center gap-2 bg-white/20 border border-white/30 text-white font-medium py-2 rounded-lg hover:bg-white/30 transition">
                    <i class="fab fa-facebook-f"></i> Facebook
                </button>
                <button id="adobeBtn"
                    class="social-btn btn-adobe flex items-center justify-center gap-2 bg-white/20 border border-white/30 text-white font-medium py-2 rounded-lg hover:bg-white/30 transition">
                    <img src="assets/img/iadobe.png" alt="Adobe" class="w-5 h-5"> Adobe
                </button>
            </div>
            <p class="text-center text-white/70 text-xs mt-6">¿Ya tienes cuenta? <a href="#"
                    class="text-blue-300 hover:underline">Inicia sesión</a></p>
        </div>
    </div>


    <script src="assets/js/login.js"></script>
    <script src="assets/js/form-login.js"></script>

</body>

</html>
